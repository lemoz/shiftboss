services:
  api:
    build:
      context: .
      dockerfile: .docker/Dockerfile.pcc-api
    network_mode: "host"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SHIFTBOSS_PORT: 5010
      SHIFTBOSS_DB_PATH: /repos/pcc/shiftboss-test.db
      SHIFTBOSS_SCAN_ROOTS: /repos
    volumes:
      - ./:/repos/pcc
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.codex:/root/.codex

  ui:
    build:
      context: .
      dockerfile: .docker/Dockerfile.pcc-ui
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5010
    network_mode: "host"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5020
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5010
      SHIFTBOSS_INTERNAL_API_BASE_URL: http://localhost:5010
    depends_on:
      - api
