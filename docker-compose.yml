services:
  api:
    build:
      context: .
      dockerfile: .docker/Dockerfile.pcc-api
    network_mode: "host"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # DB path defaults to /repos/pcc/shiftboss.db; an existing
      # control-center.db at the same location is picked up automatically.
      SHIFTBOSS_SCAN_ROOTS: /repos
    volumes:
      - ./:/repos/pcc
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SHIFTBOSS_CODEX_HOME:-${PCC_CODEX_HOME:-/home/runner/.codex}}:/root/.codex

  ui:
    build:
      context: .
      dockerfile: .docker/Dockerfile.pcc-ui
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4010
    network_mode: "host"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4010
      SHIFTBOSS_INTERNAL_API_BASE_URL: http://localhost:4010
    depends_on:
      - api

  runner:
    build:
      context: .docker
      dockerfile: Dockerfile.pcc-runner
    image: pcc-runner:latest
    restart: unless-stopped
    command: ["bash", "-lc", "sleep infinity"]
